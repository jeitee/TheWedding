<input type="file" id="file">

<button onclick="testUpload()">
    Test Upload
</button>

<script>

async function testUpload() {

    const file =
        document.getElementById("file")
        .files[0];

    const formData =
        new FormData();

    formData.append(
        "file",
        file
    );

    const response =
        await fetch(
            "https://script.google.com/macros/s/AKfycbxZNxJCZGuGUEG0qp1Ut6KzZgNow_1aeKZDJv_b8H2qmVzmxrWPzRv6hSHdn7wwDZBOsQ/exec",
            {
                method: "POST",
                body: formData
            }
        );

    const result =
        await response.json();

    console.log(result);

}

</script>
